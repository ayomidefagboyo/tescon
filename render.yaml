services:
  - type: web
    name: tescon-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PICWISH_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: PROCESSED_DIR
        value: processed
      - key: CLEANUP_TTL_HOURS
        value: 24
      - key: MAX_FILE_SIZE
        value: 100
      - key: BATCH_SIZE
        value: 500
      - key: MAX_CONCURRENT
        value: 10
    disk:
      name: tescon-storage
      mountPath: /opt/render/project/src
      sizeGB: 1
