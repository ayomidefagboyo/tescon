name: Process Images with Enhanced REMBG

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID to process'
        required: true
        type: string

env:
  PYTHON_VERSION: '3.12'

jobs:
  process-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Cache AI Models
        uses: actions/cache@v4
        with:
          path: ~/.u2net
          key: rembg-models-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            rembg-models-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install numpy==2.0.2
          pip install rembg==2.0.61
          pip install onnxruntime
          pip install boto3
          pip install requests
          pip install pandas
          pip install openpyxl
          pip install Pillow
      
      - name: Download processing code
        run: |
          # Copy the app directory from the repo (enhanced processor base)
          cp -r enhanced-rembg-processor/app .
          
          # Overwrite with robust Excel service from backend
          cp backend/app/services/excel_service.py app/services/excel_service.py
          
          # Copy the REAL Excel catalog
          cp "backend/data/Total EGTL Photo Project.xlsx" catalog.xlsx || echo "Excel file not found"
          
          # Copy the reference Excel for Long Text JDE
          cp "backend/data/EGTL_FINAL_23033_CLEANED.xlsx" "EGTL_FINAL_23033_CLEANED.xlsx" || echo "Reference Excel not found"
      
      - name: Process images
        env:
          JOB_ID: ${{ inputs.job_id }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          RENDER_WEBHOOK: "https://tescon.onrender.com/api/jobs/complete"
        run: |
          python - <<'EOF'
          import os
          import sys
          import json
          import boto3
          import requests
          from pathlib import Path
          from datetime import datetime
          from io import BytesIO

          # Add app to path
          sys.path.insert(0, os.getcwd())

          # Import processing modules
          from app.processing.rembg_processor import process_image, initialize_processor
          from app.services.excel_service import ExcelPartsService

          # Configuration
          JOB_ID = os.environ['JOB_ID'].strip()
          R2_ENDPOINT = f"https://{os.environ['R2_ENDPOINT']}"
          R2_ACCESS_KEY = os.environ['R2_ACCESS_KEY']
          R2_SECRET_KEY = os.environ['R2_SECRET_KEY']
          R2_BUCKET = os.environ['R2_BUCKET']
          RENDER_WEBHOOK = os.environ.get('RENDER_WEBHOOK', '')

          print(f"🚀 GitHub Actions Processing - Job: '{JOB_ID}'")
          print(f"💰 Saving $6,900 vs PicWish API")

          # Initialize R2
          r2 = boto3.client('s3',
              endpoint_url=R2_ENDPOINT,
              aws_access_key_id=R2_ACCESS_KEY,
              aws_secret_access_key=R2_SECRET_KEY,
              region_name='auto'
          )

          def download_job_metadata():
              """Download job metadata from R2."""
              try:
                  response = r2.get_object(
                      Bucket=R2_BUCKET,
                      Key=f"jobs/queued/{JOB_ID}.json"
                  )
                  job_data = json.loads(response['Body'].read().decode('utf-8'))
                  
                  # Support both old single-part and new multi-part format
                  if 'parts' not in job_data and 'symbol_number' in job_data:
                      # Convert old format to new format
                      job_data['parts'] = [{
                          'symbol_number': job_data['symbol_number'],
                          'raw_file_paths': job_data.get('raw_file_paths', [])
                      }]
                  
                  return job_data
              except Exception as e:
                  print(f"❌ Failed to download job metadata: {e}")
                  sys.exit(1)

          def download_images(job_data):
              """Download raw images from R2 for all parts."""
              all_images = []
              parts = job_data.get('parts', [])
              
              print(f"📥 Downloading images for {len(parts)} parts...")
              
              for part in parts:
                  symbol_number = part.get('symbol_number')
                  raw_paths = part.get('raw_file_paths', [])
                  
                  print(f"  Part {symbol_number}: {len(raw_paths)} images")
                  
                  for file_info in raw_paths:
                      try:
                          r2_key = file_info.get('r2_key')
                          filename = file_info.get('filename')
                          
                          response = r2.get_object(Bucket=R2_BUCKET, Key=r2_key)
                          image_bytes = response['Body'].read()
                          
                          all_images.append({
                              'filename': filename,
                              'bytes': image_bytes,
                              'r2_key': r2_key,
                              'symbol_number': symbol_number  # Track which part this belongs to
                          })
                          
                          print(f"    ✅ {filename}")
                      except Exception as e:
                          print(f"    ❌ Failed to download {filename}: {e}")
              
              return all_images

          def load_excel_metadata():
              """Load Excel metadata if available."""
              # Use the catalog file we copied
              excel_path = Path('catalog.xlsx')
              if excel_path.exists():
                  try:
                      # Initialize with cleaner service (from backend)
                      excel_service = ExcelPartsService()
                      # Note: backend Excel service might assume 'Total EGTL Photo Project.xlsx' logic
                      # which is compatible with what we copied.
                      excel_service.load_excel_file(str(excel_path))
                      stats = excel_service.get_stats()
                      print(f"✅ Loaded {stats['total_parts']} parts from catalog")
                      return excel_service
                  except Exception as e:
                      print(f"⚠️ Failed to load Excel: {e}")
              else:
                   print("⚠️ Catalog file not found")
              return None

          def process_images(images, job_data, excel_service):
              """Process images with rembg - handles multiple parts."""
              print(f"🎨 Processing {len(images)} images across multiple parts...")
              
              # Initialize processor
              initialize_processor()
              
              processed_files = []
              successful = 0
              failed = 0
              
              # Group images by symbol number
              from collections import defaultdict
              images_by_part = defaultdict(list)
              for img in images:
                  images_by_part[img['symbol_number']].append(img)
              
              print(f"Processing {len(images_by_part)} different parts")
              
              for symbol_number, part_images in images_by_part.items():
                  print(f"\n📦 Part {symbol_number}: {len(part_images)} images")
                  
                  for i, img_data in enumerate(part_images):
                      try:
                          filename = img_data['filename']
                          print(f"  [{i+1}/{len(part_images)}] Processing {filename}...")
                          
                          # Get part info from Excel
                          part_info = None
                          if excel_service:
                              part_info = excel_service.get_part_info(symbol_number)
                          
                          # Process image with full e-commerce layout (PNG for best quality)
                          processed_buffer = process_image(
                              img_data['bytes'],
                              output_format='PNG',
                              white_background=True,
                              use_ecommerce_layout=True,
                              symbol_number=symbol_number,
                              desc1=part_info.get('description_1') if part_info else None,
                              desc2=part_info.get('description_2') if part_info else None,
                              long_description=part_info.get('item_note') if part_info else None,
                              part_number=part_info.get('part_number') if part_info else None,
                              manufacturer=part_info.get('manufacturer') if part_info else None,
                              compression_quality=95
                          )
                          
                          # Generate proper filename with part info
                          if part_info:
                              desc = part_info.get('description_1', 'part')
                              clean_desc = ''.join(c if c.isalnum() or c in (' ', '_') else '_' for c in desc)
                              clean_desc = '_'.join(clean_desc.split())[:50]
                              output_filename = f"{symbol_number}_{i+1}_{clean_desc}.png"
                          else:
                              output_filename = f"{symbol_number}_{i+1}.png"
                          
                          r2_key = f"parts/{symbol_number}/{output_filename}"
                          
                          r2.put_object(
                              Bucket=R2_BUCKET,
                              Key=r2_key,
                              Body=processed_buffer.read(),
                              ContentType='image/png'
                          )
                          
                          processed_files.append({
                              'filename': output_filename,
                              'r2_key': r2_key
                          })
                          
                          successful += 1
                          print(f"    ✅ Uploaded to {r2_key}")
                          
                      except Exception as e:
                          failed += 1
                          print(f"    ❌ Failed: {e}")
                          import traceback
                          traceback.print_exc()
              
              return processed_files, successful, failed

          def update_job_status(job_data, processed_files, successful, failed):
              """Update job status in R2."""
              job_data['status'] = 'completed'
              job_data['completed_at'] = datetime.now().isoformat()
              job_data['processed_files_count'] = successful
              job_data['failed_files_count'] = failed
              job_data['processing_method'] = 'github_actions'
              job_data['processed_files'] = processed_files
              
              # Save to completed
              r2.put_object(
                  Bucket=R2_BUCKET,
                  Key=f"jobs/completed/{JOB_ID}.json",
                  Body=json.dumps(job_data, indent=2),
                  ContentType='application/json'
              )
              
              # Delete from queue
              try:
                  r2.delete_object(Bucket=R2_BUCKET, Key=f"jobs/queued/{JOB_ID}.json")
              except:
                  pass
              
              print(f"✅ Job status updated")

          def notify_render(job_data):
              """Notify Render webhook."""
              if not RENDER_WEBHOOK:
                  print("⚠️ No webhook configured")
                  return
              
              try:
                  response = requests.post(
                      RENDER_WEBHOOK,
                      json={
                          'job_id': JOB_ID,
                          'status': 'completed',
                          'processor': 'github_actions',
                          'processed_count': job_data.get('processed_files_count', 0)
                      },
                      timeout=30
                  )
                  
                  if response.status_code == 200:
                      print("✅ Render notified successfully")
                  else:
                      print(f"⚠️ Render notification failed: {response.status_code}")
              except Exception as e:
                  print(f"⚠️ Failed to notify Render: {e}")

          # Main execution
          try:
              start_time = datetime.now()
              
              # Download job
              job_data = download_job_metadata()
              
              # Download images
              images = download_images(job_data)
              
              if not images:
                  print("❌ No images to process")
                  sys.exit(1)
              
              # Load Excel metadata
              excel_service = load_excel_metadata()
              
              # Process images
              processed_files, successful, failed = process_images(images, job_data, excel_service)
              
              # Update job status
              update_job_status(job_data, processed_files, successful, failed)
              
              # Notify Render
              notify_render(job_data)
              
              # Summary
              elapsed = (datetime.now() - start_time).total_seconds()
              print(f"\n🎉 PROCESSING COMPLETE!")
              print(f"   ✅ Successful: {successful}")
              print(f"   ❌ Failed: {failed}")
              print(f"   ⏱️  Time: {elapsed:.1f}s")
              print(f"   💰 Saved: ${successful * 10:.2f} vs PicWish")
              
          except Exception as e:
              print(f"\n❌ PROCESSING FAILED: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          EOF
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processing-logs-${{ inputs.job_id }}
          path: |
            *.log
          retention-days: 7
