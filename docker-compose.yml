version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tescon-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/processed:/app/processed
    environment:
      - PICWISH_API_KEY=${PICWISH_API_KEY}
      - UPLOAD_DIR=uploads
      - PROCESSED_DIR=processed
      - CLEANUP_TTL_HOURS=24
      - MAX_FILE_SIZE=100
    restart: unless-stopped
    # Uncomment below if you have GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tescon-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
  processed:

